#****************************************************************************************************************
# Costmap2D: Global Map
#****************************************************************************************************************
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False

      global_frame: map # Reference frame
      robot_base_frame: base_link

      #****************************************************************************************************************
      # TF
      # TODO: Don't use timer_action in launch file, see what init_transform_timeout can do
      #****************************************************************************************************************
      transform_tolerance: 0.1 # TF transform tolerance (s).
      initial_transform_timeout: 60.0 # Time to wait for the transform from robot base frame to global frame to become available.

      #****************************************************************************************************************
      # Footprint
      # If this parameter is set, isPathValid of Planner will do full collision checking.
      # Note that the footprint can also be adjusted over time using the costmap’s ~/footprint topic, which will
      # update the polygon over time as needed due to changes in the robot’s state.
      #****************************************************************************************************************
      footprint: "[ [0.15 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15] ]" # Ordered set of footprint points passed in as a string, must be closed set.
      footprint_padding: 0.02 # Add additional padding to the footprint.
      robot_radius: 0.226 # Robot radius to use, if footprint coordinates not provided, isPathValid will do circular collision checking.

      #****************************************************************************************************************
      # Costmap Configuration
      #****************************************************************************************************************
      # Publish
      always_send_full_costmap: False # Whether to send full costmap every update, rather than updates.
      update_frequency: 10.0 # Default: 5.0
      publish_frequency: 9.0 # Frequency to publish costmap to topic. 不要设置整除update_frequency，否则发布速率不稳定

      # Size
      resolution: 0.05 # Resolution of 1 pixel of the costmap, in meters.
      height: 5 # 5 int
      width: 5 # 5 int
      origin_x: -10.0 # double ; X origin of the costmap relative to width (m).
      origin_y: -10.0 # double ; Y origin of the costmap relative to height (m).
      rolling_window: False # Whether costmap should roll with robot base frame. Only For Local Map Use.
      map_vis_z: 0.0 # Help modify the map slightly below the default plane, allows to avoid rviz visualization flickering at -0.008

      # Cost
      trinary_costmap: True # If occupancy grid map should be interpreted as only 3 values (free, occupied, unknown) or with its stored values.
      track_unknown_space: False # If false, treats unknown space as free space, else as unknown space.
      unknown_cost_value: 255 # Cost of unknown space if tracking it.
      lethal_cost_threshold: 100 # Minimum cost of an occupancy grid map to be considered a lethal obstacle.

      #****************************************************************************************************************
      # Layer Plugins
      # 1.Static Layer: This implements a costmap layer taking in a map from either SLAM or map_server (or other) to
      # place into the costmap. It resizes the costmap to its size and places the static obstacles on the planning space.
      #
      # 2.Inflation Layer: This layer places an exponential decay functions around obstacles to increase cost to traverse
      # near collision. It also places a lethal cost around obstacles within the robot’s fully inscribed radius
      # - even if a robot is non-circular for optimized first-order collision checking.
      #
      # 3.Obstacle Layer: This costmap layer implements a plugin that uses 2D raycasting for 2D lidars, depth, or other
      # sensors. It contains a 2D costmap model within it that manages the planning space by the parameters.
      #****************************************************************************************************************
      use_maximum: False # Whether when combining costmaps to use the maximum cost or override. 似乎默认static_layer是最底层


      #plugins: ["static_layer", "obstacle_layer"]
      plugins: ["pointcloud_projection_layer", "inflation_layer"] # TODO: static_layer与pointcloud_projection_layer是否冲突？
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map # Topic to subscribe to for static map.
        subscribe_to_updates: True # After receiving first static map, Whether to subscribe to updates.
        map_subscribe_transient_local: False # QoS settings for map topic.
        footprint_clearing_enabled: False # Clear any occupied cells under robot footprint.

      pointcloud_projection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /projected_map
        subscribe_to_updates: False
        map_subscribe_transient_local: False # QoS settings for map topic.
        footprint_clearing_enabled: True # Clear any occupied cells under robot footprint.

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0 # Exponential decay factor across inflation radius.
        inflation_radius: 0.7 # Radius to inflate costmap around lethal obstacles.
        inflate_unknown: False # Whether to inflate unknown cells as if lethal.
        inflate_around_unknown: False # Whether to inflate around unknown cells.

  global_costmap_client:
    ros__parameters:
      use_sim_time: False

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

#****************************************************************************************************************
# Costmap2D: Local Map
#****************************************************************************************************************
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False

      global_frame: odom # Reference frame
      robot_base_frame: base_link

      #****************************************************************************************************************
      # TF
      # TODO: Don't use timer_action in launch file, see what init_transform_timeout can do
      #****************************************************************************************************************
      transform_tolerance: 0.1 # TF transform tolerance (s).
      initial_transform_timeout: 60.0 # Time to wait for the transform from robot base frame to global frame to become available.

      #****************************************************************************************************************
      # Footprint
      # If this parameter is set, isPathValid of Planner will do full collision checking.
      # Note that the footprint can also be adjusted over time using the costmap’s ~/footprint topic, which will
      # update the polygon over time as needed due to changes in the robot’s state.
      #****************************************************************************************************************
      footprint: "[ [ 0.15 0.15 ], [ 0.15, -0.15 ], [ -0.15, -0.15 ], [ -0.15, 0.15 ] ]" # Ordered set of footprint points passed in as a string, must be closed set.
      footprint_padding: 0.02  # Add additional padding to the footprint.
      robot_radius: 0.226 # Robot radius to use, if footprint coordinates not provided, isPathValid will do circular collision checking.

      #****************************************************************************************************************
      # Costmap Configuration
      #****************************************************************************************************************
      # Publish
      always_send_full_costmap: False # Whether to send full costmap every update, rather than updates.
      update_frequency: 10.0 # Default: 5.0
      publish_frequency: 6.0 # Frequency to publish costmap to topic.

      # Size
      resolution: 0.02 # Resolution of 1 pixel of the costmap, in meters.
      height: 7 # 5 int
      width: 7 # 5 int
      origin_x: -3.5 # -1.5 double ; X origin of the costmap relative to width (m).
      origin_y: -3.5 # -1.5 double ; Y origin of the costmap relative to height (m).
      rolling_window: True # Whether costmap should roll with robot base frame. Only For Local Map Use.
      map_vis_z: 0.0 # Help modify the map slightly below the default plane, allows to avoid rviz visualization flickering at -0.008

      # Cost
      trinary_costmap: True # If occupancy grid map should be interpreted as only 3 values (free, occupied, unknown) or with its stored values.
      track_unknown_space: False # If false, treats unknown space as free space, else as unknown space.
      unknown_cost_value: 255 # Cost of unknown space if tracking it.
      lethal_cost_threshold: 100 # Minimum cost of an occupancy grid map to be considered a lethal obstacle.

      #****************************************************************************************************************
      # Layer Plugins
      # 1.Static Layer: This implements a costmap layer taking in a map from either SLAM or map_server (or other) to
      # place into the costmap. It resizes the costmap to its size and places the static obstacles on the planning space.
      #
      # 2.Inflation Layer: This layer places an exponential decay functions around obstacles to increase cost to traverse
      # near collision. It also places a lethal cost around obstacles within the robot’s fully inscribed radius
      # - even if a robot is non-circular for optimized first-order collision checking.
      #
      # 3.Obstacle Layer: This costmap layer implements a plugin that uses 2D raycasting for 2D lidars, depth, or other
      # sensors. It contains a 2D costmap model within it that manages the planning space by the parameters.
      #****************************************************************************************************************
      use_maximum: False # Whether when combining costmaps to use the maximum cost or override.

      plugins: ["stvl_layer","inflation_layer"]

      pointcloud_projection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /projected_map
        subscribe_to_updates: False
        map_subscribe_transient_local: False # QoS settings for map topic.
        footprint_clearing_enabled: False # Clear any occupied cells under robot footprint.

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0 # Exponential decay factor across inflation radius.
        inflation_radius: 0.18 # Radius to inflate costmap around lethal obstacles.
        inflate_unknown: False # Whether to inflate unknown cells as if lethal.
        inflate_around_unknown: False # Whether to inflate around unknown cells.

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 5.0    #seconds if linear, e^n if exponential
        decay_model: 0      #0=linear, 1=exponential, -1=persistent
        voxel_size: 0.01   #meters
        track_unknown_space: true   #default space is unknown
        observation_persistence: 0.0  #seconds
        max_obstacle_height: 2.0    #meters
        mark_threshold: 0      #voxel height
        update_footprint_enabled: true
        combination_method: 1      #1=max, 0=override
        obstacle_range: 3.0    #meters
        origin_z: 0.0    #meters
        publish_voxel_map: true   # default off
        transform_tolerance: 0.2    # seconds
        mapping_mode: false  # default off, saves map not for navigation
        map_save_duration: 60.0     #default 60s, how often to autosave
        observation_sources: stvl_mark
        stvl_mark:
          data_type: PointCloud2
          topic: '/cloud_registered_body'
          marking: true
          clearing: false
          min_obstacle_height: 0.3     #default 0, meters
          max_obstacle_height: 2.0     #defaule 3, meters
          expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
          observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest
          inf_is_valid: false          #default false, for laser scans
          clear_after_reading: true    #default false, clear the buffer after the layer gets readings from it
          filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
          voxel_min_points: 0          #default 0, minimum points per voxel for voxel filter

  local_costmap_client:
    ros__parameters:
      use_sim_time: False

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

#****************************************************************************************************************
# Planner Server
#****************************************************************************************************************
planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D" # In Iron and older versions, "/" was used instead of "::"
      tolerance: 0.1                        # tolerance for planning if unable to reach exact pose, in meters
      downsample_costmap: false             # whether to downsample the map
      downsampling_factor: 1                # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      allow_unknown: true                   # allow traveling in unknown space
      max_iterations: 1000000               # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      max_on_approach_iterations: 1000      # maximum number of iterations to attempt to reach goal once in tolerance
      max_planning_time: 2.0                # max time in s for planner to plan, smooth
      cost_travel_multiplier: 2.0           # Cost multiplier to apply to search to steer away from high cost areas. Larger values will place in the center of aisles more exactly (if non-`FREE` cost potential field exists) but take slightly longer to compute. To optimize for speed, a value of 1.0 is reasonable. A reasonable tradeoff value is 2.0. A value of 0.0 effective disables steering away from obstacles and acts like a naive binary search A*.
      use_final_approach_orientation: false # Whether to set the final path pose at the goal's orientation to the requested orientation (false) or in line with the approach angle so the robot doesn't rotate to heading (true)
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False


#****************************************************************************************************************
# Controller Server5
#****************************************************************************************************************
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    odom_topic: "Odometry"

    failure_tolerance: 0.3 # The maximum duration in seconds the called controller plugin can fail before the nav2_msgs::action::FollowPath action fails
    #    min_x_velocity_threshold: 0.001 # Velocity from odometry which below this threshold will be set to 0.0
    #    min_y_velocity_threshold: 0.001 # Holonomic Parameter
    #    min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]


    #****************************************************************************************************************
    # Progress checker parameters
    #****************************************************************************************************************
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker" # 1. SimpleProgressChecker; 2. PoseProgressChecker
      required_movement_radius: 0.5 # Minimum amount a robot must move to be progressing to goal (m).
      movement_time_allowance: 10.0 # Maximum amount of time a robot has to move the minimum radius

    #****************************************************************************************************************
    # Goal checker parameters
    #****************************************************************************************************************
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker" # 1. SimpleGoalChecker; 2. StoppedGoalChecker
      xy_goal_tolerance: 0.15 # Tolerance to meet goal completion criteria (m).
      yaw_goal_tolerance: 0.25 # Tolerance to meet goal completion criteria (rad).

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.25
      rotate_to_heading_angular_vel: 2.0
      max_angular_accel: 20.0
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: true
      use_path_orientations: false

      transform_tolerance: 0.1
      #****************************************************************************************************************
      # 动力学约束
      #****************************************************************************************************************
      motion_model: "DiffDrive"
      vx_max: 0.5
      vx_min: 0.0
      vy_max: 0.5 # Max VY in either direction, if holonomic
      wz_max: 3.5
      ax_max: 5.0
      ax_min: -3.0
      ay_min: -3.0
      ay_max: 3.0
      az_max: 3.5
      #****************************************************************************************************************
      # 轨迹采样
      #****************************************************************************************************************
      time_steps: 30 # 每个待选轨迹的时间步数
      model_dt: 0.05 # 每个时间步的时间间隔
      iteration_count: 1 # 为了实时性考虑，基本上设置为1
      batch_size: 2000 # 采样的待选轨迹数量
      vx_std: 0.5 # 采样Vx的标准差
      vy_std: 0.2 # 采样Vy的标准差
      wz_std: 0.4 # 采样Wz的标准差
      temperature: 0.3 # 根据轨迹成本进行选择，0表示采用成本最低的轨迹，数值很大时偏向于不考虑成本，将所有轨迹做平均
      gamma: 0.015 # 在平滑性(high)和低能量消耗(low)之间权衡，影响非常复杂，通常无需调整
      reset_period: 1.0 # Required time of inactivity to reset optimizer (only in Humble due to backport ABI policies).
      regenerate_noises: false # 一般设置为false，具体原因见官方Github仓库
      prune_distance: 3.5 # 将轨迹长度限制在此范围内

      #****************************************************************************************************************
      # 可视化
      #****************************************************************************************************************
      visualize: true # 可视化待选轨迹，对性能影响很大，仅仅用于调试
      #      publish_optimal_trajectory: false # 是否发布整条轨迹，用于可视化，或者下游控制器需要更前瞻的信息时使用，Humble似乎不支持
      TrajectoryVisualizer:
        trajectory_step: 5 # 轨迹可视化的步长
        time_step: 3 # 轨迹可视化的时间步数

      #****************************************************************************************************************
      # 转向半径约束，仅在Ackermann模型下生效
      #****************************************************************************************************************
      #      AckermannConstraints:
      #        min_turning_r: 0.2

      #****************************************************************************************************************
      # ConstraintCritic： 惩罚在动力学约束外的轨迹
      # GoalCritic： 与目标点足够近时，鼓励直接向目标点导航
      # GoalAngleCritic： 与目标点足够近时，鼓励导航吊证姿态角度与目标姿态一致
      # PreferForwardCritic： 鼓励前进方向，而不是倒退
      # ObstaclesCritic： 通过robot_radius或footprint进行碰撞检查，惩罚膨胀的轨迹
      # Cost Critic： 直接用膨胀后的costmap做避障惩罚
      # PathAlignCritic： 鼓励与全局规划路径方向对齐
      # PathFollowCritic： 鼓励与全局规划期路径尽可能近
      # PathAngleCritic： 惩罚与全局规划路径夹角较大的轨迹，有助于机器人急转弯
      # VelocityDeadbandCritic： 惩罚在死区下的速度
      # TwirlingCritic： 惩罚holonomic机器人不必要的旋转
      #****************************************************************************************************************
      critics: ["ConstraintCritic", "GoalCritic", "GoalAngleCritic", "CostCritic", "ObstaclesCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic", "VelocityDeadbandCritic", "TwirlingCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4 # 离目标点在这个距离内，开始考虑GoalCritic
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5 # 离目标点在这个距离内，GoalAngleCritic
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        consider_footprint: false # 是否使用footprint
        collision_cost: 10.0 # 惩罚膨胀的轨迹(不建议过高，过高会引起震荡)
        collision_margin_distance: 0.05 # 离碰撞一定的距离内，施加严重惩罚
        critical_weight: 10.0 # 离碰撞一定的距离内，施加严重的惩罚系数，内部仅仅虚拟扩大机器人footprint
        near_goal_distance: 0.5 # 在离目标点足够近时，停止优先考虑ObstaclesCritic，以平稳收敛到目标点
        repulsion_weight: 2.5 # 更偏向lower cost space内的路径，可以用于动态场景中进行微调，避免过于贴近障碍物，在膨胀层范围内生效
        inflation_radius: 0.7 # (only in Humble) 在Jazzy中，可以直接指定读取inflation_layer
        cost_scaling_factor: 4.0 # (only in Humble) 在Jazzy中，可以直接指定读取inflation_layer
      CostCritic:
        enabled: false
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 100.0 # 惩罚在膨胀层内的轨迹
        consider_footprint: true
        collision_cost: 1000000.0 # 惩罚发生膨胀的轨迹
        near_goal_distance: 1.0 # 在离目标点足够近时，停止优先考虑CostCritic，以平稳收敛到目标点
        trajectory_point_step: 2 # 评估轨迹采用的步长。由于轨迹非常密集，评估每个点开销很大
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 50.0
        max_path_occupancy_ratio: 0.05 # 允许全局路径穿过occupied的比例，超过这个比例，会在跟踪路径的同时避障
        trajectory_point_step: 4 # 评估轨迹采用的步长。由于轨迹非常密集，评估每个点开销很大
        threshold_to_consider: 0.3 # 与goal在此距离内时，不考虑PathAlignCritic
        offset_from_furthest: 20 # 只有待选轨迹规划了足够远的点，才会考虑PathAlignCritic
        use_path_orientations: false # 是否听从全局路径的朝向，用于适应Hybrid A*之类的kinodynamic feasible的规划器
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 15 # 只有待选轨迹规划了足够远的点，才会考虑PathFollowCritic
        threshold_to_consider: 1.4 # 与goal在此距离内时，不考虑PathFollowCritic
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 15 # 只有待选轨迹规划了足够远的点，才会考虑PathFollowCritic
        threshold_to_consider: 0.5 # 与goal在此距离内时，不考虑PathFollowCritic
        max_angle_to_furthest: 1.0
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        threshold_to_consider: 0.5
      VelocityDeadbandCritic:
        enabled: false
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.05, 0.05, 0.2] #  [vx, vz, wz]
      TwirlingCritic:
        enabled: false
        twirling_cost_power: 1
        twirling_cost_weight: 10.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
